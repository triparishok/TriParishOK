name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Rebuild daily so notices with end dates expire without a manual edit.
    # 12:15 UTC is 7:15 AM CDT or 6:15 AM CST.
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.164.0
  HUGO_BASEURL: https://triparishok.github.io/TriParishOK/
  GITHUB_PAGES_PREFIX: /TriParishOK

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: |
          HUGO_PARAMS_NOINDEX=true hugo --gc --config hugo.toml --baseURL "${HUGO_BASEURL}"

      - name: Rewrite root-relative paths for GitHub Pages project preview
        run: |
          python3 scripts/rewrite-gh-pages-paths.py public

      - name: Validate review SEO metadata
        run: |
          python3 scripts/audit-seo.py public \
            --expected-base "${HUGO_BASEURL}" \
            --expect-noindex yes

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
