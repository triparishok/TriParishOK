name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: 0.164.0
  HUGO_BASEURL: https://amberlargent.github.io/TriParishOK/
  GITHUB_PAGES_PREFIX: /TriParishOK

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: |
          hugo --gc --minify --baseURL "${HUGO_BASEURL}"

      - name: Rewrite root-relative links for GitHub Pages project path
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import os

          public = Path("public")
          prefix = os.environ["GITHUB_PAGES_PREFIX"].rstrip("/")

          file_types = {".html", ".xml", ".css", ".js", ".json", ".webmanifest"}

          for path in public.rglob("*"):
              if not path.is_file() or path.suffix.lower() not in file_types:
                  continue

              text = path.read_text(errors="ignore")
              original = text

              # HTML attributes: href="/...", src="/...", action="/..."
              text = re.sub(
                  r'(\b(?:href|src|action)=["\'])/(?!TriParishOK/|/)',
                  lambda m: m.group(1) + prefix + "/",
                  text
              )

              # CSS url(/...), url("/..."), url('/...')
              text = re.sub(
                  r'(url\(["\']?)/(?!TriParishOK/|/)',
                  lambda m: m.group(1) + prefix + "/",
                  text
              )

              if text != original:
                  path.write_text(text)
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
