name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.164.0
  HUGO_BASEURL: https://amberlargent.me/TriParishOK/
  GITHUB_PAGES_PREFIX: /TriParishOK

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: |
          hugo --gc --baseURL "${HUGO_BASEURL}"

      - name: Rewrite root-relative paths for GitHub Pages
        run: |
          python3 <<'PY2'
          from pathlib import Path
          import os

          prefix = os.environ["GITHUB_PAGES_PREFIX"].rstrip("/")
          public = Path("public")
          exts = {".html", ".xml", ".css", ".js", ".json", ".webmanifest"}

          replacements = [
              ('href="/', f'href="{prefix}/'),
              ("href='/", f"href='{prefix}/"),
              ('src="/', f'src="{prefix}/'),
              ("src='/", f"src='{prefix}/"),
              ('action="/', f'action="{prefix}/'),
              ("action='/", f"action='{prefix}/"),
              ('url("/', f'url("{prefix}/'),
              ("url('/", f"url('{prefix}/"),
              ('url(/', f'url({prefix}/'),
          ]

          for path in public.rglob("*"):
              if not path.is_file() or path.suffix.lower() not in exts:
                  continue

              text = path.read_text(errors="ignore")
              original = text

              for old, new in replacements:
                  text = text.replace(old, new)

              text = text.replace(f"{prefix}{prefix}/", f"{prefix}/")

              if text != original:
                  path.write_text(text)
          PY2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
