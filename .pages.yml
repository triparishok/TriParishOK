media:
  - name: bulletin_files
    label: Bulletin Files
    input: static/bulletins
    output: /bulletins
    extensions: [png, jpg, jpeg, pdf]
    rename: safe
    categories: [image, document]

content:
  - name: weekly-updates
    label: Weekly Updates
    type: group
    items:
      - name: notices
        label: Current Notices & Events
        type: file
        path: data/notices.yaml
        format: yaml
        fields:
          - name: items
            label: Notices Shown on the Website
            type: object
            description: "Enter each notice once. The site will reuse it wherever it belongs."
            list:
              min: 0
              max: 20
              collapsible:
                collapsed: true
                summary: "{title}"
            fields:
              - name: enabled
                label: Show This Notice
                type: boolean
                required: false
                default: true
                description: "Turn this off to hide the notice without deleting it."

              - name: label
                label: Notice Type
                type: select
                required: true
                options:
                  placeholder: "Choose the notice type"
                  values:
                    - Schedule Change
                    - Current Need
                    - Special Mass
                    - Parish Event
                    - Faith Formation
                    - Office Notice
                    - Sacrament Notice
                    - Community Meal

              - name: title
                label: Notice Title
                type: string
                required: true
                description: "Use a short, clear headline."

              - name: detail
                label: Notice Details
                type: text
                required: true
                description: "Write one or two clear sentences with the essential information."

              - name: parishes
                label: Who Is This Notice For?
                type: select
                required: true
                description: "Choose Tri-Parish by itself, or choose one or more specific parishes."
                options:
                  multiple: true
                  min: 1
                  max: 3
                  placeholder: "Choose the parish or parishes"
                  values:
                    - name: tri-parish
                      label: All Three Parishes
                    - name: mother-of-sorrows
                      label: Mother of Sorrows — Apache
                    - name: st-ann
                      label: St. Ann — Elgin
                    - name: olph
                      label: Our Lady of Perpetual Help — Sterling

              - name: start_date
                label: First Day to Show
                type: date
                required: true
                description: "The notice will not appear before this date."
                options:
                  format: yyyy-MM-dd

              - name: end_date
                label: Last Day to Show
                type: date
                required: false
                default: ""
                description: "Leave blank for an ongoing need. Dated notices stop showing after this date."
                options:
                  format: yyyy-MM-dd

              - name: affects_schedule
                label: Does This Change Mass or Confession?
                type: boolean
                required: false
                default: false
                description: "Turn this on for cancellations, special Masses, or other schedule changes. The notice will also appear above the regular schedule."

              - name: action
                label: Button
                type: select
                required: true
                default: none
                description: "Choose the safest next step for the visitor."
                options:
                  values:
                    - name: none
                      label: No Button
                    - name: email-office
                      label: Email the Parish Office
                    - name: call-office
                      label: Call the Parish Office
                    - name: contact-page
                      label: Open the Contact Page
                    - name: bulletin
                      label: Open the Current Bulletin

      - name: bulletin
        label: Weekly Bulletin
        type: file
        path: data/bulletin.yaml
        format: yaml
        fields:
          - name: current
            label: Current Bulletin
            type: object
            fields:
              - name: date
                label: Bulletin Date
                type: string
                required: true
                description: "Example: July 12, 2026"

              - name: pages
                label: Number of Pages
                type: string
                required: true
                description: "Example: 2 pages"

              - name: page_images
                label: Bulletin Page Images
                type: object
                list:
                  min: 1
                  max: 8
                  collapsible:
                    collapsed: false
                    summary: "{alt}"
                fields:
                  - name: src
                    label: Page Image or PDF
                    type: file
                    required: true
                    description: "Upload page 1 first, then page 2, etc. PNG or JPG is best for page images."
                    options:
                      media: bulletin_files
                      extensions: [png, jpg, jpeg, pdf]
                      rename: safe

                  - name: alt
                    label: Alt Text
                    type: string
                    required: true
                    description: "Example: Page 1 of the July 12, 2026 tri-parish bulletin"

              - name: homily
                label: Father's Homily Note
                type: object
                fields:
                  - name: enabled
                    label: Show Homily Note This Week
                    type: boolean
                    required: false
                    default: true
                    description: "Turn this off if there is no homily note for the current bulletin."

                  - name: title
                    label: Title
                    type: string
                    required: false
                    description: "Leave blank if there is no homily note this week."

                  - name: intro
                    label: Intro
                    type: text
                    required: false

                  - name: paragraphs
                    label: Paragraphs
                    type: object
                    required: false
                    list:
                      min: 0
                      max: 8
                      collapsible:
                        collapsed: false
                        summary: "{text}"
                    fields:
                      - name: text
                        label: Paragraph Text
                        type: text
                        required: false

              - name: accessibility_note
                label: Reading Note
                type: text
                required: true
                readonly: true

          - name: source_note
            label: Schedule Source Note
            type: text
            required: true
            readonly: true

  - name: regular-schedules
    label: Regular Schedules — Rare Changes
    type: group
    items:
      - name: schedule
        label: Regular Mass & Prayer Schedule
        type: file
        path: data/schedule.yaml
        format: yaml
        fields:
          - name: source_note
            label: Important
            type: text
            readonly: true
            description: "This reminder appears on the website and cannot be changed from this screen."

          - name: mass
            label: Regular Mass Times
            type: object
            description: "Only edit when the normal recurring Mass schedule changes. Put one-week cancellations and special Masses under Weekly Updates instead."
            list:
              min: 1
              max: 30
              collapsible:
                collapsed: true
                summary: "{day} — {time}"
            fields:
              - name: section
                label: Weekend or Weekday?
                type: select
                required: true
                options:
                  placeholder: "Choose weekend or weekday"
                  values:
                    - name: weekend
                      label: Weekend Mass
                    - name: weekday
                      label: Weekday Mass

              - name: day
                label: Day
                type: string
                required: true
                description: "Examples: Sunday, Tuesday, Saturday Vigil, or First Saturday"

              - name: time
                label: Time
                type: string
                required: true
                description: "Example: 8:30 AM"

              - name: parish
                label: Parish
                type: select
                required: true
                options:
                  placeholder: "Choose the parish"
                  values:
                    - name: mother-of-sorrows
                      label: Mother of Sorrows — Apache
                    - name: st-ann
                      label: St. Ann — Elgin
                    - name: olph
                      label: Our Lady of Perpetual Help — Sterling

          - name: confession
            label: Regular Confession Times
            type: object
            description: "Only edit when the normal recurring Confession schedule changes. Put temporary changes under Weekly Updates."
            list:
              min: 1
              max: 12
              collapsible:
                collapsed: true
                summary: "{day} — {time}"
            fields:
              - name: day
                label: Day
                type: string
                required: true
                description: "Examples: Sunday, Saturday, or First Friday"

              - name: time
                label: Time
                type: string
                required: true
                description: "Examples: 8:00 AM, After Mass, or 9:00 AM–10:00 AM"

              - name: parish
                label: Parish
                type: select
                required: true
                options:
                  placeholder: "Choose the parish"
                  values:
                    - name: mother-of-sorrows
                      label: Mother of Sorrows — Apache
                    - name: st-ann
                      label: St. Ann — Elgin
                    - name: olph
                      label: Our Lady of Perpetual Help — Sterling

          - name: adoration
            label: Regular Adoration Times
            type: object
            description: "Only edit when the normal recurring Adoration schedule changes. Put temporary changes under Weekly Updates."
            list:
              min: 1
              max: 12
              collapsible:
                collapsed: true
                summary: "{day} — {time}"
            fields:
              - name: day
                label: Day
                type: string
                required: true
                description: "Examples: First Thursday, Other Thursdays, or First Friday"

              - name: time
                label: Time
                type: string
                required: true
                description: "Example: 6:00 PM–7:00 PM"

              - name: parish
                label: Parish
                type: select
                required: true
                options:
                  placeholder: "Choose the parish"
                  values:
                    - name: mother-of-sorrows
                      label: Mother of Sorrows — Apache
                    - name: st-ann
                      label: St. Ann — Elgin
                    - name: olph
                      label: Our Lady of Perpetual Help — Sterling

          - name: rosary
            label: Regular Rosary Times
            type: object
            description: "Only edit when the normal recurring Rosary schedule changes. Put temporary changes under Weekly Updates."
            list:
              min: 1
              max: 12
              collapsible:
                collapsed: true
                summary: "{day} — {time}"
            fields:
              - name: day
                label: Day
                type: string
                required: true
                description: "Example: Sunday"

              - name: time
                label: Time
                type: string
                required: true
                description: "Example: 10:00 AM"

              - name: parish
                label: Parish
                type: select
                required: true
                options:
                  placeholder: "Choose the parish"
                  values:
                    - name: mother-of-sorrows
                      label: Mother of Sorrows — Apache
                    - name: st-ann
                      label: St. Ann — Elgin
                    - name: olph
                      label: Our Lady of Perpetual Help — Sterling

  - name: formation-programs
    label: Formation Programs — Occasional Changes
    type: group
    items:
      - name: programs
        label: Religious Education, Confirmation & OCIA
        type: file
        path: data/formation_programs.yaml
        format: yaml
        fields:
          - name: programs
            label: Programs
            type: object
            description: "Edit these only when a regular program, meeting time, host parish, or contact changes."
            list:
              min: 1
              max: 12
              collapsible:
                collapsed: true
                summary: "{program} — {when}"
            fields:
              - name: enabled
                label: Show This Program
                type: boolean
                required: false
                default: true
                description: "Turn this off to hide the program without deleting it."

              - name: program
                label: Program
                type: select
                required: true
                options:
                  placeholder: "Choose the program"
                  values:
                    - Religious Education
                    - Confirmation
                    - OCIA

              - name: serves
                label: Who Does It Serve?
                type: select
                required: true
                options:
                  values:
                    - name: parish
                      label: Families at the Host Parish
                    - name: tri-parish
                      label: All Three Parishes

              - name: host_parish
                label: Host Parish
                type: select
                required: true
                description: "This is where the program normally meets. It does not limit a Tri-Parish program to that parish."
                options:
                  placeholder: "Choose the host parish"
                  values:
                    - name: mother-of-sorrows
                      label: Mother of Sorrows — Apache
                    - name: st-ann
                      label: St. Ann — Elgin
                    - name: olph
                      label: Our Lady of Perpetual Help — Sterling

              - name: when
                label: Regular Meeting Time
                type: string
                required: true
                description: "Example: Wednesdays during the school year at 7:00 PM"

              - name: contact_name
                label: Program Contact
                type: string
                required: true
                description: "Enter the contact name only. Visitors will still be directed through the parish office."

              - name: summary
                label: Program Description
                type: text
                required: true
                description: "Briefly explain the purpose of the program."
