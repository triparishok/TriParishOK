  history:
    - "St. Ann traces its roots to a Catholic community in Elgin that first worshiped in a former schoolhouse known as St. Anthony’s. Before a regular Mass schedule was established, priests came from Lawton and the church served as a chapel of convenience for local Catholic families."
    - "In 1941, the community began planning for a new church. Parish families contributed money and livestock, and Catholic Extension Society support helped make the new church possible. The church was named St. Ann’s in memory of Anna A. Beckert."
    - "Construction began in November 1946, with much of the work done by parish members. The new church was dedicated on May 11, 1948. A parish hall was built in 1967, a rectory was added in 1997, and new religious education classrooms were built in 2004."
  history_source_note: "History adapted from the former Tri-Parish About page."

- name: "Our Lady of Perpetual Help"
  slug: "olph"
  short_name: "OLPH"
  city: "Sterling"
  established: "1904"
  address: "122 N A Ave"
  address_line_2: "Sterling, OK 73567"
  map_url: "https://www.google.com/maps/search/?api=1&query=122+N+A+Ave+Sterling+OK+73567"
  apple_map_url: "http://maps.apple.com/?daddr=122+N+A+Ave+Sterling+OK+73567&dirflg=d"
  parish_class: "parish-olph"
  summary: "Serving the Catholic community in Sterling and the surrounding area."
  image: "/images/parishes/olph.jpg"
  image_alt: "Our Lady of Perpetual Help Catholic Church in Sterling, Oklahoma"
  image_credit: "Parish-provided photograph; photographer unknown"
  visitor_access:
    parking_entrance: "Parking is available near the church. The main entrance has a ramp with railings, and there are no steps that prevent access to worship."
    family_seating: "Families are welcome to sit together throughout Mass. OLPH does not have a separate cry room."
    restrooms: "Accessible restrooms are available in the parish hall. A changing table is not currently available."
  history:
    - "The first Mass for the Catholic community that became Our Lady of Perpetual Help was celebrated in a parishioner’s home by Rev. Urban de Hasque on August 21, 1902. Under the direction of Rev. William Huffer of Lawton, a church was established and built in 1904."
    - "The early parish community was made up largely of farm families. A school was established in 1909, and the first rectory was built in 1910 during the residency of Rev. Anthony Van der Grinten."
    - "After fire destroyed the church on December 22, 1928, the parish quickly began rebuilding. The present church was dedicated to Our Lady of Perpetual Help on October 8, 1929. The old school building still stands and now serves as a fellowship hall, religious education space, and parish activity space."
  history_source_note: "History adapted from the former Tri-Parish About page."

