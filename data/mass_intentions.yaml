title: "Mass Intentions"
summary: "To have a Mass said in memory of a loved one or in thanksgiving for prayers answered, write the intention on paper and include who is requesting it."
steps:
  - "Place the written intention in a white envelope marked “Mass Intentions.”"
  - "Enclose the note with a $10 stipend per Mass."
  - "Place the envelope in the collection basket."
  - "If using a check, make it payable to the name of your church and write “Mass Intentions” in the memo."
