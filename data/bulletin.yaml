  homily:
    enabled: true
    title: "The Parable of the Sower"
    intro: "In this Sunday’s Gospel, Jesus tells the familiar Parable of the Sower."
    paragraphs:
      - "The seed is the Word of God, generously sown for all people. The different types of soil represent the condition of our hearts. At times, our hearts can become hardened by pride or indifference, shallow through lack of prayer, or crowded with the worries, distractions, and temptations of daily life. Yet God never stops sowing His Word with patience, love, and hope."
      - "Jesus invites us to become rich soil where His Word can take deep root and bear abundant fruit. This happens as we listen attentively to Scripture, remain faithful in prayer, receive the sacraments, and put our faith into action through charity and service. The Christian life is not simply about hearing God’s Word but allowing it to transform us from within."
      - "As we celebrate the Eucharist this weekend, let us ask the Holy Spirit to prepare our hearts to receive God’s Word with openness and trust. May His grace remove whatever prevents us from growing in holiness, so that our lives may bear a rich harvest of faith, hope, love, and joyful witness to Christ in our families, our parish, and our community."

  accessibility_note: "The bulletin is provided as page images. Tap any page or choose Open Full Size to zoom. Choose Download Page Image to save it; on iPhone, the Share button can also save or print. Key notices and Father’s homily note are also listed as regular web text."

