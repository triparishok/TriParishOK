  homily:
    enabled: true
    title: Seeds of the Kingdom
    intro: In this Sunday’s Gospel, Jesus tells the parable of the wheat and the
      weeds.
    paragraphs:
      - text: A farmer sows good seed in his field, but during the night an enemy plants
          weeds among the wheat. When the servants notice the weeds, they ask if
          they should pull them up immediately. The master  surprises them by
          saying, “No,” because uprooting the weeds might also damage the wheat.
          Instead, both are allowed to grow together until the harvest.
      - text: This parable reminds us that God’s Kingdom is already present in the
          world, but it has not yet reached its fullness. Good and evil exist
          side by side, even within our own hearts. We may be tempted to judge
          others or become discouraged by the presence of sin and injustice. Yet
          Jesus calls us to trust in God’s wisdom and timing. He alone sees the
          whole picture and will bring perfect justice at the final judgment.
      - text: The remaining parables—the mustard seed and the yeast—offer a message of
          hope. God’s Kingdom often begins in small, hidden ways. A simple act
          of kindness, a faithful prayer, a word of encouragement, or a quiet
          sacrifice may seem insignificant, yet God uses these small acts to
          accomplish great things. Like a tiny mustard seed that becomes a large
          tree or yeast that transforms an entire batch of dough, God’s grace
          quietly changes hearts, families, and communities.
      - text: >-
          As Catholics, we are invited to be both patient and   faithful. Rather
          than focusing on the faults of others, we should allow Christ to
          cultivate the good within us. Through the Eucharist, prayer, the
          Sacrament of Reconciliation, and works of charity, we become fruitful
          disciples who help God’s Kingdom grow.

          This week, ask yourself: What small seed of faith is God asking me to
          nurture today? When we cooperate with His grace, even the smallest
          acts of love can bear abundant fruit for His Kingdom.
