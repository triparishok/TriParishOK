intro:
  title: "Giving & Stewardship"
  summary: "Thank you for prayerfully supporting the worship, ministry, maintenance, and daily life of our Catholic parishes."

st_ann_online:
  eyebrow: "St. Ann Online Giving"
  title: "Give online to St. Ann Catholic Church"
  summary: "Online giving is currently available through St. Ann Catholic Church. Donations made through this online giving link are deposited directly into St. Ann’s parish accounts and support the ministries and needs of St. Ann."
  action_text: "Give Online to St. Ann"
  action_url: "https://onrealm.org/SaintAnnChurch/give/now"

supporting_parishes:
  eyebrow: "Supporting Our Parishes"
  title: "Faithful support at OLPH and Mother of Sorrows"
  summary: "Our Lady of Perpetual Help and Mother of Sorrows parishioners are encouraged to continue their faithful support through the existing parish giving methods."

annual_appeal:
  eyebrow: "Archdiocese of Oklahoma City"
  title: "Annual Catholic Appeal"
  summary: "The Annual Catholic Appeal supports the mission of the Archdiocese of Oklahoma City and ministries that serve Catholics throughout our local Church. Parishioners are invited to prayerfully consider supporting this important effort. Gifts to the Annual Catholic Appeal support Archdiocesan ministries and are separate from parish offertory giving."
  action_text: "Support the Annual Catholic Appeal"
  action_url: "https://archokc.org/appeal"

stewardship:
  eyebrow: "Catholic Stewardship"
  title: "Giving is part of parish life"
  summary: "Catholic stewardship is a response of gratitude to God. We give back from what He has given us, supporting the Holy Sacrifice of the Mass, the work of the Church, and the needs of our parish families."

safety_note:
  title: "Use official giving links"
  summary: "For your security, use only giving information published on this official parish website, in the current bulletin, or provided directly by the parish office."
